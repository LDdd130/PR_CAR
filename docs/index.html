<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PR_CAR Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1216; --panel:#171b21; --panel2:#1e242c; --line:#2a323c;
    --text:#e6edf3; --dim:#8b98a5; --mute:#5c6875;
    --live:#35c9d6; --ok:#4ec77a; --warn:#e0a83c; --danger:#e2554e;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans)}
  body{max-width:460px;margin:0 auto;padding:12px 14px 28px;min-height:100vh}
  .row{display:flex;gap:10px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px}
  .lbl{font-size:11px;letter-spacing:1px;color:var(--mute);text-transform:uppercase}
  .num{font-family:var(--mono);font-weight:500;font-variant-numeric:tabular-nums}

  /* topbar */
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .brand{font-family:var(--mono);font-weight:700;font-size:16px;letter-spacing:1px}
  .brand small{color:var(--live)}
  .conn{display:flex;align-items:center;gap:8px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--mute)}
  .dot.on{background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .cstat{font-size:12px;color:var(--dim);font-family:var(--mono)}
  button{font-family:var(--sans);font-size:14px;color:var(--text);background:var(--panel2);
    border:1px solid var(--line);border-radius:10px;padding:8px 14px;cursor:pointer;transition:.12s}
  button:hover{border-color:var(--dim)}
  button:active{transform:scale(.97)}
  button:disabled{opacity:.35;cursor:not-allowed}
  .btn-conn{background:var(--live);color:#04252a;border:none;font-weight:600}
  .btn-conn.busy{background:var(--danger);color:#2a0a08}

  /* heading dial */
  .hero{display:flex;flex-direction:column;align-items:center;padding:6px 0 2px}
  .needle{transition:transform .18s ease-out;transform-origin:100px 100px}
  @media (prefers-reduced-motion:reduce){.needle,.car{transition:none}}

  /* corridor */
  .corr{display:flex;align-items:center;gap:8px;height:34px;margin:2px 0}
  .wall{width:7px;height:30px;background:var(--mute);border-radius:2px}
  .track{position:relative;flex:1;height:6px;background:var(--panel2);border-radius:3px}
  .center-tick{position:absolute;left:50%;top:-4px;width:1px;height:14px;background:var(--line)}
  .car{position:absolute;top:50%;width:26px;height:16px;background:var(--live);border-radius:4px;
    transform:translate(-50%,-50%);left:50%;transition:left .18s ease-out}
  .corr-lbl{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--dim)}

  /* metrics */
  .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
  .metric{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
  .metric .v{font-size:26px;margin-top:3px}
  .metric .u{font-size:11px;color:var(--mute)}

  /* state + flags */
  .staterow{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px}
  .badge{font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:2px;
    padding:6px 18px;border-radius:999px;background:var(--panel2);color:var(--live);border:1px solid var(--line)}
  .flags{display:flex;gap:6px}
  .flag{font-size:10px;font-family:var(--mono);padding:3px 7px;border-radius:6px;
    background:var(--panel2);color:var(--mute);border:1px solid var(--line)}
  .flag.on{color:var(--ok);border-color:var(--ok)}

  /* controls */
  .ctrl{margin-top:16px}
  .toggles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{flex:1;border:none;border-radius:0;background:transparent;padding:10px 0;font-weight:500}
  .seg button.sel{background:var(--panel2);color:var(--live)}
  .seg.pw button.sel.on{color:var(--ok)}
  .dpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto}
  .dpad .sp{visibility:hidden}
  .dpad button{padding:16px 0;font-size:22px;font-family:var(--mono);touch-action:none;user-select:none}
  .dpad button.stop{color:var(--danger);border-color:#4a2320}
  .tune{display:flex;gap:8px;margin-top:14px;align-items:center}
  .tune label{font-size:12px;color:var(--dim);white-space:nowrap}
  .tune input{flex:1;font-family:var(--mono);background:var(--panel);color:var(--text);
    border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:14px;min-width:0}

  /* raw / hint */
  .raw{margin-top:14px;font-family:var(--mono);font-size:11px;color:var(--mute);
    background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 10px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hint{margin-top:14px;font-size:12px;color:var(--warn);background:#1e1810;
    border:1px solid #3a2f16;border-radius:10px;padding:10px 12px;line-height:1.5;display:none}
  .hint.show{display:block}
</style>
</head>
<body>

  <div class="top">
    <div class="brand">PR_CAR<small>·CONSOLE</small></div>
    <div class="conn">
      <span class="dot" id="dot"></span>
      <span class="cstat" id="cstat">미연결</span>
      <button class="btn-conn" id="connBtn">연결</button>
    </div>
  </div>

  <div class="hint" id="hint"></div>

  <!-- 헤딩 나침반 (시그니처) -->
  <div class="card hero">
    <svg viewBox="0 0 200 200" width="180" height="180" role="img" aria-label="heading">
      <circle cx="100" cy="100" r="88" fill="none" stroke="var(--line)" stroke-width="2"/>
      <g id="ticks"></g>
      <text x="100" y="26" text-anchor="middle" font-size="12" fill="var(--mute)" font-family="var(--mono)">N</text>
      <text x="180" y="105" text-anchor="middle" font-size="12" fill="var(--mute)" font-family="var(--mono)">E</text>
      <text x="100" y="184" text-anchor="middle" font-size="12" fill="var(--mute)" font-family="var(--mono)">S</text>
      <text x="20" y="105" text-anchor="middle" font-size="12" fill="var(--mute)" font-family="var(--mono)">W</text>
      <g class="needle" id="needle">
        <line x1="100" y1="100" x2="100" y2="26" stroke="var(--live)" stroke-width="3" stroke-linecap="round"/>
        <line x1="100" y1="100" x2="100" y2="140" stroke="var(--mute)" stroke-width="3" stroke-linecap="round"/>
      </g>
      <circle cx="100" cy="100" r="6" fill="var(--live)"/>
      <text x="100" y="92" text-anchor="middle" font-size="34" font-weight="500" fill="var(--text)" font-family="var(--mono)" id="hdgTxt">--</text>
      <text x="100" y="118" text-anchor="middle" font-size="11" fill="var(--mute)" letter-spacing="2" font-family="var(--mono)">HEADING °</text>
    </svg>
  </div>

  <!-- 복도 중앙유지 (시그니처 2) -->
  <div class="card" style="margin-top:12px">
    <div class="lbl" style="margin-bottom:8px">중앙 유지 (측면 ToF)</div>
    <div class="corr">
      <span class="wall"></span>
      <div class="track"><span class="center-tick"></span><span class="car" id="car"></span></div>
      <span class="wall"></span>
    </div>
    <div class="corr-lbl"><span>좌 <b class="num" id="lTxt">--</b> mm</span><span>우 <b class="num" id="rTxt">--</b> mm</span></div>
  </div>

  <!-- 전방 / 속도 -->
  <div class="metrics">
    <div class="metric"><div class="lbl">전방</div><div class="v num" id="fVal">--</div><div class="u">cm</div></div>
    <div class="metric"><div class="lbl">속도 L</div><div class="v num" id="vlVal">--</div><div class="u">cm/s</div></div>
    <div class="metric"><div class="lbl">속도 R</div><div class="v num" id="vrVal">--</div><div class="u">cm/s</div></div>
  </div>

  <!-- 상태 + 플래그 -->
  <div class="staterow">
    <span class="badge" id="stBadge">--</span>
    <div class="flags">
      <span class="flag" id="fl-imu">IMU</span>
      <span class="flag" id="fl-side">SIDE</span>
      <span class="flag" id="fl-front">FRONT</span>
    </div>
  </div>

  <!-- 조작 -->
  <div class="ctrl">
    <div class="toggles">
      <div class="seg pw">
        <button id="pwOn">전원 ON</button>
        <button id="pwOff" class="sel">OFF</button>
      </div>
      <div class="seg">
        <button id="mdAuto">AUTO</button>
        <button id="mdMan">MANUAL</button>
      </div>
    </div>

    <div class="dpad" id="dpad">
      <span class="sp"></span>
      <button data-cmd="U" aria-label="전진">▲</button>
      <span class="sp"></span>
      <button data-cmd="L" aria-label="좌회전">◀</button>
      <button data-cmd="S" class="stop" aria-label="정지">■</button>
      <button data-cmd="R" aria-label="우회전">▶</button>
      <span class="sp"></span>
      <button data-cmd="D" aria-label="후진">▼</button>
      <span class="sp"></span>
    </div>

    <div class="tune">
      <label>목표속도</label>
      <input type="number" id="vtIn" placeholder="예: 45" inputmode="numeric">
      <button id="vtSend">#VT 전송</button>
    </div>

    <!-- 원시 명령: R2 duty 스윕 캘리브(#ML=35 / #MR=35), 텔레메트리 제어(#TEL=0, #HZ=5) 등 -->
    <div class="tune">
      <label>RAW 명령</label>
      <input type="text" id="rawIn" placeholder="#ML=35  ·  #HZ=5  ·  #TEL=0" autocapitalize="off" autocomplete="off">
      <button id="rawSend">전송</button>
    </div>
  </div>

  <div class="raw" id="raw">최근 패킷: (없음)</div>

<script>
/* ============================================================
   PR_CAR Web Bluetooth Console  —  HM-10 (BLE, GATT FFE0/FFE1)
   프레임: T,t_ms,front,L,R,heading×10,vL,vR,state,flags\n
   명령:  전원 1/0 · 모드 A/M · 수동 U/D/L/R/S · 튜닝 #VT=..\n
   ============================================================ */

/* ---- 필요 시 여기만 수정 ---- */
const HM10_SERVICE = 0xFFE0;      // HM-10 표준 시리얼 서비스
const HM10_CHAR    = 0xFFE1;      // 표준 시리얼 특성 (write + notify)
const NAME_PREFIXES = ['HM','BT','MLT','CC41'];  // 클론 대응: 모듈 이름 앞글자
const STATE_NAMES = ['CRUISE','BRAKE','SPIN','REVERSE','HOLD','SIDE_AVOID','CORNER','MANUAL'];

const $ = id => document.getElementById(id);
let bleChar = null, bleDevice = null, rxBuf = '';

/* ---------- 나침반 눈금 생성 ---------- */
(function(){let s='';for(let d=0;d<360;d+=30){const a=(d-90)*Math.PI/180;
  const r1=d%90===0?76:81, r2=88;
  s+=`<line x1="${100+r1*Math.cos(a)}" y1="${100+r1*Math.sin(a)}" x2="${100+r2*Math.cos(a)}" y2="${100+r2*Math.sin(a)}" stroke="var(--line)" stroke-width="${d%90===0?2:1}"/>`;}
  $('ticks').innerHTML=s;})();

/* ---------- 연결 ---------- */
async function connect(){
  if(!navigator.bluetooth){ showHint('이 브라우저는 Web Bluetooth를 지원하지 않습니다. 안드로이드 Chrome에서 열어주세요.'); return; }
  if(!window.isSecureContext){ showHint('HTTPS 환경이 필요합니다. GitHub Pages 등에 올려서 https:// 로 여세요.'); return; }
  try{
    bleDevice = await navigator.bluetooth.requestDevice({
      filters:[{services:[HM10_SERVICE]}, ...NAME_PREFIXES.map(p=>({namePrefix:p}))],
      optionalServices:[HM10_SERVICE]
    });
    bleDevice.addEventListener('gattserverdisconnected', onDisconnect);
    const srv  = await bleDevice.gatt.connect();
    const svc  = await srv.getPrimaryService(HM10_SERVICE);
    bleChar    = await svc.getCharacteristic(HM10_CHAR);
    await bleChar.startNotifications();
    bleChar.addEventListener('characteristicvaluechanged', onNotify);
    setConn(true, bleDevice.name || 'HM-10');
    hideHint();
  }catch(e){
    if(e && e.name==='NotFoundError') return;    // 사용자가 취소
    showHint('연결 실패: '+(e.message||e)+'  · 모듈 이름을 코드 상단 NAME_PREFIXES에 추가해보세요.');
  }
}
function onDisconnect(){ setConn(false); bleChar=null; }
async function disconnect(){ if(bleDevice&&bleDevice.gatt.connected) bleDevice.gatt.disconnect(); }

/* ---------- 수신: 20바이트 분할을 LF로 재조립 ---------- */
const decoder = new TextDecoder();
function onNotify(e){
  rxBuf += decoder.decode(e.target.value);
  let i;
  while((i = rxBuf.indexOf('\n')) >= 0){
    const line = rxBuf.slice(0, i).trim();
    rxBuf = rxBuf.slice(i + 1);
    if(line) parseFrame(line);
  }
  if(rxBuf.length > 200) rxBuf = '';   // 폭주 방지
}

function parseFrame(line){
  const p = line.split(',');
  if(p[0] !== 'T' || p.length < 10) return;   // 헤더/필드수 검증
  const f=+p[2], L=+p[3], R=+p[4], hdg=(+p[5])/10, vL=+p[6], vR=+p[7], st=+p[8], fl=+p[9];
  updateUI({f,L,R,hdg,vL,vR,st,fl});
  $('raw').textContent = '최근 패킷: ' + line;
}

/* ---------- UI 갱신 ---------- */
function updateUI(d){
  // 헤딩
  $('needle').style.transform = `rotate(${d.hdg}deg)`;
  $('hdgTxt').textContent = d.hdg.toFixed(1);
  // 복도 중앙
  $('lTxt').textContent = d.L; $('rTxt').textContent = d.R;
  const tot = d.L + d.R;
  let pct = tot>0 ? (d.L/tot)*100 : 50;
  pct = Math.max(12, Math.min(88, pct));
  $('car').style.left = pct.toFixed(0)+'%';
  // 전방 (근접=위험색)
  const fEl = $('fVal'); fEl.textContent = d.f;
  fEl.style.color = d.f<20 ? 'var(--danger)' : d.f<35 ? 'var(--warn)' : 'var(--text)';
  // 속도
  $('vlVal').textContent = d.vL; $('vrVal').textContent = d.vR;
  // 상태
  $('stBadge').textContent = STATE_NAMES[d.st] || '?';
  // 플래그  (b0 front, b1 side, b2 imu, b3 power, b4 mode)
  $('fl-front').classList.toggle('on', !!(d.fl & 1));
  $('fl-side').classList.toggle('on',  !!(d.fl & 2));
  $('fl-imu').classList.toggle('on',   !!(d.fl & 4));
  // 토글 상태를 실제 차량 상태(flags)로 반영
  reflectToggles(!!(d.fl & 8), !!(d.fl & 16));
}

/* ---------- 송신 ---------- */
const encoder = new TextEncoder();
async function send(str){
  if(!bleChar){ showHint('먼저 [연결] 버튼으로 HM-10에 연결하세요.'); return; }
  try{
    const data = encoder.encode(str);
    if(bleChar.properties.writeWithoutResponse) await bleChar.writeValueWithoutResponse(data);
    else await bleChar.writeValue(data);
  }catch(err){ showHint('송신 실패: '+(err.message||err)); }
}

/* ---------- 조작 바인딩 ---------- */
$('connBtn').onclick = () => (bleDevice && bleDevice.gatt.connected) ? disconnect() : connect();
$('pwOn').onclick  = () => send('1');
$('pwOff').onclick = () => send('0');
$('mdAuto').onclick= () => send('A');
$('mdMan').onclick = () => send('M');
$('vtSend').onclick= () => { const v=$('vtIn').value.trim(); if(v!=='') send('#VT='+v+'\n'); };
$('rawSend').onclick= () => { const v=$('rawIn').value.trim(); if(v!=='') send(v+'\n'); };
$('rawIn').addEventListener('keydown', e => { if(e.key==='Enter') $('rawSend').click(); });

// D-pad: 누르는 동안 이동, 떼면 정지 (수동값이 래칭이라 hold-to-drive가 안전)
$('dpad').querySelectorAll('button').forEach(b=>{
  const cmd = b.dataset.cmd;
  if(cmd === 'S'){ b.onclick = () => send('S'); return; }
  const press = ev => { ev.preventDefault(); send(cmd); };
  const release = () => send('S');
  b.addEventListener('pointerdown', press);
  b.addEventListener('pointerup', release);
  b.addEventListener('pointercancel', release);
  b.addEventListener('pointerleave', release);
});

/* ---------- 표시 헬퍼 ---------- */
function setConn(ok, name){
  $('dot').classList.toggle('on', ok);
  $('cstat').textContent = ok ? (name||'연결됨') : '미연결';
  const btn=$('connBtn'); btn.textContent = ok?'해제':'연결'; btn.classList.toggle('busy', ok);
  $('dpad').style.opacity = ok?1:.5;
}
function reflectToggles(power, manual){
  $('pwOn').classList.toggle('sel', power);  $('pwOn').classList.toggle('on', power);
  $('pwOff').classList.toggle('sel', !power);
  $('mdAuto').classList.toggle('sel', power && !manual);
  $('mdMan').classList.toggle('sel', power && manual);
  // 수동일 때만 방향패드 활성
  $('dpad').querySelectorAll('button[data-cmd]').forEach(b=>{
    if(b.dataset.cmd!=='S') b.disabled = !manual;
  });
}
function showHint(m){ const h=$('hint'); h.textContent=m; h.classList.add('show'); }
function hideHint(){ $('hint').classList.remove('show'); }

// 초기: 지원 여부 안내
if(!navigator.bluetooth) showHint('안드로이드 Chrome에서 열어야 블루투스 연결이 됩니다. (데스크톱/아이폰 사파리는 Web Bluetooth 미지원)');
setConn(false);
reflectToggles(false,false);
</script>
</body>
</html>
